[pytest]
# Pytest configuration for Sistema Tesis Multi-Tenant

# Minimum version
minversion = 6.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    -ra

# Coverage options
# addopts = --cov=src --cov-report=html --cov-report=term-missing

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    security: Security tests
    load: Load tests
    slow: Slow tests (>1s)

# Timeout for tests (seconds)
timeout = 30

# Ignore paths
norecursedirs = .git .venv build dist *.egg venv

# Console output
console_output_style = progress

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS
